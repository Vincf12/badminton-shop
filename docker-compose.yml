version: "3.9"
services:
  db:
    image: mysql:8.0
    container_name: badminton_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-badminton_shop}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app123}
    ports: ["3307:3306"]
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: badminton_backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: badminton_frontend
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    ports: ["5173:5173"]
    command: npm run dev -- --host

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-app}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-app123}
    ports: ["8080:80"]
    depends_on:
      - db

volumes:
  db_data:
